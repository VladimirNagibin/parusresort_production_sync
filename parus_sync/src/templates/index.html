<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* Блокируем клики по оригинальной кнопке чата Битрикс */
    .b24-widget-button-social-item[data-b24-crm-button-widget="openline_livechat"] {
        pointer-events: none !important;
        cursor: default !important;
    }
    
    /* Скрываем оригинальный tooltip, чтобы не было двойных подсказок */
    .b24-widget-button-social-item[data-b24-crm-button-widget="openline_livechat"] .b24-widget-button-social-tooltip {
        display: none !important;
    }
</style>
<!-- Виджет Jivo (кнопка скрыта, но сам чат активен) -->
<script> function jivo_onLoadCallback() {const jivo_custom_widget = true;}</script>
<script src="//code.jivo.ru/widget/EpqrD0PZvX" async></script>

<!-- БИТРИКС24 (виджет на сайте уже присутствует) -->
<script>
	(function(w,d,u){
			var s=d.createElement('script');s.async=true;s.src=u+'?'+(Date.now()/60000|0);
			var h=d.getElementsByTagName('script')[0];h.parentNode.insertBefore(s,h);
	})(window,document,'https://cdn-ru.bitrix24.ru/b8388981/crm/site_button/loader_2_o0k0ls.js');
</script>
	

</head>
<body>

<script>
(function() {
    'use strict';

    const CONFIG = {
        'openline_livechat': 'Написать в чат',
        'callback': 'Заказать звонок',
        'openline_2064b649-977c': 'Написать в Макс',
        'default': 'Связаться с нами'
    };

    const CHAT_SELECTOR = '.b24-widget-button-social-item[data-b24-crm-button-widget="openline_livechat"]';

    // 1. Функция безопасного изменения названий
    function updateLabels() {
        const buttons = document.querySelectorAll('.b24-widget-button-social-item');
        buttons.forEach(btn => {
            const widgetType = btn.getAttribute('data-b24-crm-button-widget');
            const tooltip = btn.querySelector('.b24-widget-button-social-tooltip');

            if (!tooltip) return;

            const newLabel = CONFIG[widgetType] || CONFIG['default'];

            if (newLabel && tooltip && tooltip.textContent !== newLabel) {
                tooltip.textContent = newLabel;
                btn.setAttribute('title', newLabel);
            }
        });
    }

    // 2. Жесткий перехват клика по чату Битрикс
    function interceptEvent(event) {
        const chatButton = event.target.closest(CHAT_SELECTOR);
        if (!chatButton) return;

        // Блокируем стандартное поведение и всплытие на максимально ранней стадии
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();

        console.log('Перехвачен клик по чату Битрикс, открываем Jivo');

        // Открываем Jivo с небольшой задержкой, чтобы браузер успел отменить действие Битрикс
        setTimeout(() => {
            if (typeof jivo_api !== 'undefined' && jivo_api.open) {
                jivo_api.open();
            } else {
                console.warn('Jivo API ещё не загружен или недоступен');
            }
        }, 50);

        return false;
    }

    // 3. Инициализация
    function init() {
        // Применяем метки сразу
        updateLabels();

        // Вешаем перехватчики в фазе ЗАХВАТА (capture: true) - это срабатывает раньше всего
        const events = ['pointerdown', 'touchstart', 'mousedown', 'click'];
        events.forEach(evt => {
            // { capture: true, passive: false } критически важен для мобильных устройств
            document.addEventListener(evt, interceptEvent, { capture: true, passive: false });
        });

        // Наблюдатель для случая, если Битрикс перерисует кнопки (например, при смене языка)
        const observer = new MutationObserver(() => {
            updateLabels();
        });
        observer.observe(document.body, { childList: true, subtree: true });
    }

    // Запуск
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>


</body>
</html>
